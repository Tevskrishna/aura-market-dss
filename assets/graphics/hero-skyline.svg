<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none" role="img" aria-label="Bengaluru micro-market skyline">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1117"/>
      <stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff4b4b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3dd68c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#sky)"/>
  <ellipse cx="400" cy="300" rx="320" ry="40" fill="url(#glow)" opacity="0.7">
    <animate attributeName="opacity" values="0.35;0.85;0.35" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- runway / highway -->
  <path d="M40 250 H760" stroke="#30363d" stroke-width="6"/>
  <path d="M40 250 H760" stroke="#f0b429" stroke-width="2" stroke-dasharray="14 18">
    <animate attributeName="stroke-dashoffset" from="0" to="64" dur="2.2s" repeatCount="indefinite"/>
  </path>
  <!-- buildings -->
  <g fill="#222831" stroke="#484f58" stroke-width="1.5">
    <rect x="80" y="140" width="48" height="110" rx="4"/>
    <rect x="140" y="100" width="56" height="150" rx="4"/>
    <rect x="210" y="120" width="42" height="130" rx="4"/>
    <rect x="280" y="70" width="70" height="180" rx="4"/>
    <rect x="370" y="95" width="50" height="155" rx="4"/>
    <rect x="440" y="55" width="78" height="195" rx="4"/>
    <rect x="540" y="110" width="52" height="140" rx="4"/>
    <rect x="610" y="85" width="60" height="165" rx="4"/>
    <rect x="690" y="130" width="46" height="120" rx="4"/>
  </g>
  <!-- windows pulse -->
  <g fill="#58a6ff">
    <rect x="152" y="120" width="8" height="8" opacity="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/></rect>
    <rect x="300" y="95" width="8" height="8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.4s" repeatCount="indefinite"/></rect>
    <rect x="470" y="80" width="8" height="8" fill="#3dd68c"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.8s" repeatCount="indefinite"/></rect>
    <rect x="630" y="110" width="8" height="8" fill="#ff4b4b"><animate attributeName="opacity" values="0.25;1;0.25" dur="1.4s" begin="0.2s" repeatCount="indefinite"/></rect>
  </g>
  <!-- radar pin -->
  <g transform="translate(460 48)">
    <circle r="26" fill="none" stroke="#ff4b4b" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="10;34" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="7" fill="#ff4b4b"/>
  </g>
  <text x="40" y="36" fill="#8b949e" font-family="Inter,Segoe UI,sans-serif" font-size="14" letter-spacing="2">BENGALURU · LIVE DECISION SURFACE</text>
</svg>
