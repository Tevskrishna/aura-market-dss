name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Pytest
        run: python -m pytest tests/ -q --tb=short
      - name: Sync SQLite mirror
        run: python -c "from services.sqlite_store import sync_catalog_to_sqlite; print(sync_catalog_to_sqlite())"
